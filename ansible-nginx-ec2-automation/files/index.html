<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1917 Strikers Travel | Explore the World</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: #f4f7f6; color: #333; }
        
        /* Hero Section */
        header {
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
                        url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=1350&q=80');
            background-size: cover;
            background-position: center;
            height: 60vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
        }

        h1 { font-size: 3.5rem; margin-bottom: 10px; }
        p { font-size: 1.2rem; margin-bottom: 30px; }

        /* Search Bar */
        .search-container {
            background: white;
            padding: 20px;
            border-radius: 50px;
            display: flex;
            width: 80%;
            max-width: 600px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        input { border: none; flex: 1; padding: 10px 20px; font-size: 1rem; outline: none; border-radius: 50px;}
        button { background: #ff4b2b; color: white; border: none; padding: 10px 30px; border-radius: 50px; cursor: pointer; font-weight: 600; transition: 0.3s; }
        button:hover { background: #ff416c; }

        /* Destination Grid */
        .destinations { padding: 50px 10%; display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .card { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.1); transition: 0.3s; }
        .card:hover { transform: translateY(-10px); }
        .card img { width: 100%; height: 200px; object-fit: cover; }
        .card-content { padding: 20px; }
        .price { color: #ff4b2b; font-weight: bold; font-size: 1.2rem; }
    </style>
</head>
<body>

    <header>
        <h1>1917 Strikers Travel</h1>
        <p>Book your next adventure with the best prices.</p>
        <div class="search-container">
            <input type="text" placeholder="Where do you want to go?">
            <button>Search</button>
        </div>
    </header>

    <section class="destinations">
        <div class="card">
            <img src="https://images.unsplash.com/photo-1537996194471-e657df975ab4?auto=format&fit=crop&w=500&q=60" alt="Bali">
            <div class="card-content">
                <h3>Bali, Indonesia</h3>
                <p>Tropical paradise awaits you.</p>
                <span class="price">$499</span>
            </div>
        </div>
        <div class="card">
            <img src="https://images.unsplash.com/photo-1502602898657-3e91760cbb34?auto=format&fit=crop&w=500&q=60" alt="Paris">
            <div class="card-content">
                <h3>Paris, France</h3>
                <p>The city of lights and love.</p>
                <span class="price">$750</span>
            </div>
        </div>
        <div class="card">
            <img src="https://images.unsplash.com/photo-1523906834658-6e24ef2386f9?auto=format&fit=crop&w=500&q=60" alt="Venice">
            <div class="card-content">
                <h3>Venice, Italy</h3>
                <p>Explore the historic canals.</p>
                <span class="price">$620</span>
            </div>
        </div>
    </section>

</body>
</html>
